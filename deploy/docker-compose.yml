version: '3.9'

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - ../frontend/static:/var/www/static:ro
    depends_on:
      app:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../server/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ph_wifi
      POSTGRES_USER: ${POSTGRES_USER:-wifi_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wifi_admin} -d ph_wifi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Omada Software Controller (取代 OC200 硬體) ──
  omada:
    image: mbentley/omada-controller:5.14
    environment:
      TZ: Asia/Manila
      MANAGE_HTTP_PORT: 8088
      MANAGE_HTTPS_PORT: 8043
      PORTAL_HTTP_PORT: 8088
      PORTAL_HTTPS_PORT: 8843
    ports:
      # AP 通訊 — 必須暴露到主機（EAP 設備直連這些 port）
      - "29810:29810/udp"          # Discovery
      - "29811:29811"              # AP management v1
      - "29812:29812"              # AP adoption
      - "29813:29813"              # AP upgrade
      - "29814:29814"              # AP manager v2
    volumes:
      - omada_data:/opt/tplink/EAPController/data
      - omada_logs:/opt/tplink/EAPController/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -k https://localhost:8043 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local
  omada_data:
    driver: local
  omada_logs:
    driver: local
