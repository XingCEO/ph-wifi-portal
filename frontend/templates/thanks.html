<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connected — Free WiFi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #09090b;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .icon-wrap {
      width: 72px;
      height: 72px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #a1a1aa;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .tagalog {
      font-size: 12px;
      color: #71717a;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: #22c55e;
      font-weight: 500;
      margin: 20px 0;
    }
    .redirect-btn {
      display: block;
      width: 100%;
      height: 48px;
      background: transparent;
      border: 1px solid #3f3f46;
      border-radius: 10px;
      color: #a1a1aa;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      margin-top: 12px;
    }
    .redirect-btn:hover { border-color: #71717a; color: #fafafa; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1 class="title">Connected Successfully</h1>
    <div class="badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      1 Hour Free Internet
    </div>
    <p class="subtitle">You are now connected to the internet.</p>
    <p class="tagalog">Nakakonekta ka na sa internet — 1 oras na libreng paggamit</p>
    <button class="redirect-btn" onclick="window.location.href='https://google.com'">
      Continue browsing →
    </button>
  </div>
  <script>
    const raw = new URLSearchParams(window.location.search).get('to') || 'https://google.com';
    // Validate URL to prevent open redirect attacks
    let redirect = 'https://google.com';
    try {
      const url = new URL(raw);
      if (url.protocol === 'http:' || url.protocol === 'https:') redirect = raw;
    } catch(e) { /* invalid URL, use default */ }
    setTimeout(function() { window.location.href = redirect; }, 1500);
  </script>
</body>
</html>
