<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Error — WiFi Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #09090b;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card { text-align: center; max-width: 360px; width: 100%; }
    .icon-wrap {
      width: 64px; height: 64px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .title { font-size: 20px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px; }
    .message { font-size: 14px; color: #a1a1aa; line-height: 1.6; margin-bottom: 24px; }
    .retry-btn {
      display: block; width: 100%; height: 48px;
      background: #18181b; border: 1px solid #3f3f46;
      border-radius: 10px; color: #fafafa;
      font-size: 14px; font-family: inherit; cursor: pointer;
      transition: background 0.15s;
    }
    .retry-btn:hover { background: #27272a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <h1 class="title">{{ error_title | default("Connection Error") }}</h1>
    <p class="message">{{ error_message | default("Something went wrong. Please try again.") }}</p>
    <button class="retry-btn" onclick="window.history.back()">Try Again</button>
  </div>
</body>
</html>
